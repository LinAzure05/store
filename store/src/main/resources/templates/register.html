<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        :root {
            --orange-1: #fff7ed;
            --orange-2: #ffe0bf;
            --orange-3: #ffb36d;
            --orange-4: #ff922b;
            --orange-5: #f76707;
            --text-main: #4a2a0b;
            --text-sub: #8f5a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(145deg, var(--orange-2), var(--orange-1));
            color: var(--text-main);
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            border: 1px solid #ffd3a8;
            box-shadow: 0 14px 34px rgba(247, 103, 7, .18);
        }

        .title {
            text-align: center;
            margin-bottom: 18px;
        }

        .title h2 { color: var(--orange-5); margin-bottom: 6px; }
        .title p { color: var(--text-sub); font-size: 14px; }

        .alert {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            background: #fff1f0;
            border: 1px solid #ffc9c9;
            color: #c92a2a;
        }

        .form-item { margin-bottom: 14px; }
        .form-item label { display: block; margin-bottom: 7px; font-size: 14px; font-weight: 700; }

        .input, select {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: 1px solid #ffd3a8;
            padding: 0 12px;
            outline: none;
            background: #fffdfa;
        }

        .input:focus, select:focus {
            border-color: var(--orange-4);
            box-shadow: 0 0 0 3px rgba(255, 146, 43, .2);
        }

        .btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff922b, #f76707);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .extra {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
        }

        .extra a { color: var(--orange-5); text-decoration: none; font-weight: 700; }

        .tips {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fff4e6;
            border: 1px dashed #ffb36d;
            color: #9c6644;
            font-size: 13px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">
        <h2>创建账号</h2>
        <p>注册后即可进入手工艺品交易平台</p>
    </div>

    <p th:if="${error}" th:text="${error}" class="alert"></p>

    <div class="tips">
        账号与密码要求：<br>
        1）用户名 4~20 位，建议使用字母+数字；<br>
        2）密码 6~20 位，建议包含字母、数字和符号；<br>
        3）手机号需为大陆手机号格式（11 位）；<br>
        4）邮箱需为有效邮箱格式。
    </div>

    <form th:action="@{/auth/register}" th:object="${registerForm}" method="post">
        <div class="form-item">
            <label for="username">用户名</label>
            <input id="username" class="input" type="text" th:field="*{username}" placeholder="4~20位（字母/数字）">
        </div>
        <div class="form-item">
            <label for="password">密码</label>
            <input id="password" class="input" type="password" th:field="*{password}" placeholder="6~20位，建议字母+数字+符号">
        </div>
        <div class="form-item">
            <label for="phone">手机号</label>
            <input id="phone" class="input" type="text" th:field="*{phone}" placeholder="请输入手机号">
        </div>
        <div class="form-item">
            <label for="email">邮箱</label>
            <input id="email" class="input" type="text" th:field="*{email}" placeholder="请输入邮箱">
        </div>
        <div class="form-item">
            <label for="role">注册身份</label>
            <select id="role" th:field="*{role}">
                <option value="consumer">消费者</option>
                <option value="merchant">商家</option>
            </select>
        </div>

        <button type="submit" class="btn">立即注册</button>
    </form>

    <div class="extra">
        已有账号？<a th:href="@{/auth/login}">去登录</a>
    </div>
</div>
</body>
</html>
