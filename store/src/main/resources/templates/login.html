<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        :root {
            --orange-1: #fff5eb;
            --orange-2: #ffd8a8;
            --orange-3: #ffb066;
            --orange-4: #ff922b;
            --orange-5: #f76707;
            --text-main: #4a2a0b;
            --text-sub: #8f5a2a;
            --danger: #c92a2a;
            --success: #2b8a3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, var(--orange-2), var(--orange-1) 55%);
            color: var(--text-main);
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            border-radius: 16px;
            background: #ffffff;
            padding: 32px 28px;
            box-shadow: 0 18px 40px rgba(247, 103, 7, 0.2);
            border: 1px solid rgba(255, 146, 43, 0.28);
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h2 {
            color: var(--orange-5);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .brand p {
            color: var(--text-sub);
            font-size: 14px;
        }

        .alert {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .alert-error {
            background: #fff1f0;
            color: var(--danger);
            border: 1px solid #ffc9c9;
        }

        .alert-success {
            background: #ebfbee;
            color: var(--success);
            border: 1px solid #b2f2bb;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
        }

        .form-item input {
            width: 100%;
            border: 1px solid #ffd0a1;
            border-radius: 10px;
            height: 44px;
            padding: 0 12px;
            outline: none;
            transition: all .2s ease;
            color: var(--text-main);
            background-color: #fffdfa;
        }

        .form-item input:focus {
            border-color: var(--orange-4);
            box-shadow: 0 0 0 3px rgba(255, 146, 43, 0.2);
            background-color: #fff;
        }

        .login-btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff922b, #f76707);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
            box-shadow: 0 8px 18px rgba(247, 103, 7, 0.28);
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(247, 103, 7, 0.34);
        }

        .extra-link {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
        }

        .extra-link a {
            color: var(--orange-5);
            text-decoration: none;
            font-weight: 600;
        }

        .extra-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">
        <h2>欢迎登录</h2>
        <p>传统手工艺品交易服务平台</p>
    </div>

    <p th:if="${error}" th:text="${error}" class="alert alert-error"></p>
    <p th:if="${success}" th:text="${success}" class="alert alert-success"></p>

    <form th:action="@{/auth/login}" th:object="${loginForm}" method="post">
        <div class="form-item">
            <label for="username">用户名</label>
            <input id="username" type="text" th:field="*{username}" placeholder="请输入用户名">
        </div>
        <div class="form-item">
            <label for="password">密码</label>
            <input id="password" type="password" th:field="*{password}" placeholder="请输入密码">
        </div>
        <button type="submit" class="login-btn">登 录</button>
    </form>

    <div class="extra-link">
        没有账号？<a th:href="@{/auth/register}">立即注册</a>
    </div>
</div>
</body>
</html>
